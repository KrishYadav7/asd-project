<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed-Fixed Bar Vibration Solver</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Longitudinal Bar Vibration (Fixed-Fixed)</h1>
            <p>Analytical vs. Finite Element Method Analysis</p>
        </header>

        <div class="grid-layout">
            <div class="panel inputs">
                <h2>System Parameters</h2>
                <div class="input-group">
                    <label>Young's Modulus, E (Pa):</label>
                    <input type="number" id="E" value="200e9" step="1e9">
                </div>
                <div class="input-group">
                    <label>Density, &rho; (kg/m³):</label>
                    <input type="number" id="rho" value="7850">
                </div>
                <div class="input-group">
                    <label>Cross-Sectional Area, A (m²):</label>
                    <input type="number" id="A" value="0.01" step="0.001">
                </div>
                <div class="input-group">
                    <label>Length, L (m):</label>
                    <input type="number" id="L" value="1.0" step="0.1">
                </div>
                <div class="input-group">
                    <label>Number of Elements, N:</label>
                    <input type="number" id="N" value="10" min="2" max="100">
                </div>
                <div class="input-group">
                    <label>Mode to Plot (n):</label>
                    <input type="number" id="mode" value="1" min="1" max="10">
                </div>
                <button onclick="runAnalysis()">Run Calculation</button>
            </div>

            <div class="panel output">
                <h2>Frequencies & Error</h2>
                <div id="resultsTableContainer">
                    <p><em>Run the analysis to view results.</em></p>
                </div>
            </div>
        </div>

        <div class="panel plot-panel">
            <h2>Mode Shape Comparison</h2>
            <div id="plot"></div>
        </div>

        <div class="panel log-panel">
            <h2>Calculation Log (Step-by-Step)</h2>
            <pre id="calcLog">Awaiting calculation...</pre>
        </div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
